name: Custom Codex Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "codex-rs/**"
      - ".github/workflows/custom-codex-build.yml"

jobs:
  build-linux-x64:
    name: Build Linux x64 codex
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rs

      - name: Build codex-cli
        run: cargo build -p codex-cli --release

      - name: Prepare artifact
        run: |
          mkdir -p ../dist
          cp target/release/codex ../dist/codex-linux-x64
          chmod +x ../dist/codex-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-linux-x64
          path: dist/codex-linux-x64
